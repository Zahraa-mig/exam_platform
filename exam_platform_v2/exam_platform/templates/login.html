<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول – منصة الامتحانات</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <span class="icon">🎓</span>
      <h1>منصة الامتحانات</h1>
      <p>أدخل بياناتك للوصول إلى حسابك</p>
    </div>

    {% if error %}
    <div class="flash flash-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/">
      <div class="form-group">
        <label for="username">اسم المستخدم</label>
        <input id="username" name="username" type="text" placeholder="أدخل اسم المستخدم" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">كلمة المرور</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:.5rem;">
        دخول
      </button>
    </form>

    <p style="text-align:center; margin-top:1.5rem; font-size:.78rem; color:var(--muted);">
      التسجيل العام مغلق – الحسابات تُمنح من الأستاذ فقط
    </p>
  </div>
</div>
</body>
</html>
